######## Dbcleaner — served by config-server for application=dbcleaner, profile=docker ########
# Requested by the client as:  configserver:  →  /dbcleaner/docker/main
#
# The ${...} placeholders are NOT resolved here by config-server. Config-server
# serves this text as-is; the dbcleaner CONTAINER resolves the placeholders from
# its Portainer stack environment. That keeps secrets (passwords) out of git —
# exactly like eventstracker-prod.yml.


server:
  port: 8085

spring:
  application:
    name: dbcleaner
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      max-lifetime: 300000
      keepalive-time: 120000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  messages:
    basename: messages,messagesWeb
  session:
    jdbc:
      initialize-schema: always

# External datasources dbcleaner cleans (host names are the stack service names)
app:
  datasources:
    runs-app:
      url: ${RUNS_APP_DB_URL}
      username: ${RUNS_APP_DB_USERNAME}
      password: ${RUNS_APP_DB_PASSWORD}
    eventstracker:
      url: ${EVENTS_TRACKER_DB_URL}
      username: ${EVENTS_TRACKER_DB_USERNAME}
      password: ${EVENTS_TRACKER_DB_PASSWORD}
    runs-ai:
      url: ${RUNS_AI_DB_URL}
      username: ${RUNS_AI_DB_USERNAME}
      password: ${RUNS_AI_DB_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

logging:
  level:
    me.sathish.dbcleaner: INFO
    org.springframework.cloud.config: INFO
