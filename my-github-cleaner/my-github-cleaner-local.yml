######## My-GitHub-Cleaner Local Configuration #########
server:
  port: ${PORT:7080}

################ Database #####################
# Uses the GITHUB_CLEANER_DB_* naming convention (matches consolidated-postgres's
# projects.txt / vm-db-up.sh, which is what actually sets these on the VM and in
# each project's local .env) — not JDBC_DATABASE_* or SPRING_DATASOURCE_*, so
# there's exactly one name per project to keep in sync everywhere.
spring:
  datasource:
    url: ${GITHUB_CLEANER_DB_URL}
    username: ${GITHUB_CLEANER_DB_USER}
    password: ${GITHUB_CLEANER_DB_PASSWORD}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  cloud:
    kubernetes:
      discovery:
        all-namespaces: true

  ################ RabbitMQ #####################
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

################ Logging #####################
logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(---){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %clr(%t){magenta} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: "applogs/app.log"
  level:
    org.springframework.web: INFO
    com.zaxxer.hikari: ERROR
    root: debug

################ Error Handling #####################
error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    http-statuses:
      org.springframework.security.authorization.AuthorizationDeniedException: unauthorized
    codes:
      RepositoriesRepoNameUnique: REPOSITORIES_REPO_NAME_UNIQUE

################ Management #####################
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  server:
    port: ${MANAGEMENT_PORT:8081}

################ Eventstracker Service Configuration #####################
# EventTrackerService.java reads these as RAW env vars via environment.getProperty(),
# not via this "eventstracker.*" YAML path (that binding is unused/dead — nothing
# in the code reads it). The actual requirements, and they're hard requirements
# (the service throws if any is missing), are the literal container/OS env vars:
#   EVENTSTRACKER_URL, eventstracker_username, eventstracker_password
# Set those three directly wherever this app runs — a YAML block here can't help.

decorator:
  datasource:
    p6spy:
      enable-logging: true
      custom-appender-class: com.p6spy.engine.spy.appender.MultiLineFormat

################ GitHub Operations #####################
sathishprojects:
  github_operations_queue: q.sathishprojects.github.api.events
  sathish_project_events_exchange: x.sathishprojects.fanout
  github_routing_key: sathishprojects.github.api.event
