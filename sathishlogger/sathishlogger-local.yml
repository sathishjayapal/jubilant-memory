######## SathishLogger Local Configuration #########
server:
  port: 8080

################ Database #####################
spring:
  datasource:
    url: jdbc:h2:mem:sathishlogger
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

################ Logging #####################
logging:
  level:
    com.sathish.sathishlogger: DEBUG
    org.springframework.cloud.config: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
  file:
    name: ./logs/sathishlogger.log

################ Custom Properties #####################
sathishlogger:
  storage:
    type: database
    file-path: ./logs/application-logs.json
  security:
    api-key-enabled: false
    api-key:
  retention:
    days: 30
  batch:
    max-size: 100
